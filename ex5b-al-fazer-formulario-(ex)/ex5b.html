<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
     <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
 
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card login-card p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Bem-vindo</h3>
                    <p class="text-muted">Acesse sua conta para continuar</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-semibold">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" placeholder="nome@exemplo.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" placeholder="" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-login">
                            Entrar <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>

                
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
