<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  

  
</head>
<body class="d-flex justify-content-center align-items-center vh-100" style="background:#f4f9cb;">

  <form style="width: 320px;" class="bg-white p-4 rounded shadow-sm">
    <h3 class="text-center mb-4">Login</h3>

    <!-- Email -->
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" id="email" class="form-control" placeholder="Digite seu email" required />
      </div>
    </div>

    <!-- Senha -->
    <div class="mb-4">
      <label for="senha" class="form-label">Senha</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required />
      </div>
    </div>

    <button type="submit" class="btn btn-warning w-100 d-flex justify-content-center align-items-center gap-2">
      Entrar <i class="bi bi-arrow-right"></i>
    </button>
  </form>

</body>
</html>
