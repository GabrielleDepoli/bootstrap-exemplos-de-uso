<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap com NPM</title>

    <!-- Link do Bootstrap instalado pelo NPM -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.css">

    <!-- Link do JS Bootstrap instalado pelo NPM -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.js" defer></script>

</head>
<body>
    
    <!-- O que é NPM "NODE PACKAGE MANAGER" Gerenciador de pacotes do Node.js -->
    <!-- npm install bootstrap@5.3.8 -->

   <h1>Olá, mundo!</h1>
    <p>Bem-Vindo ao Bootstrap!!</p>

    <button class="btn btn-primary">Calcular</button>
    <button class="btn btn-danger">Sair</button>
    
    
</body>
</html>
