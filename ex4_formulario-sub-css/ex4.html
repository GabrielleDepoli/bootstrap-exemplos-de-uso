<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Bootstrap Customizado</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Formulário -->
    <div class="container mt-3"> <!-- mt = margin top-->
        <form class="custom-form"> <!--custom form será utilizado um estilo personalizado -->

            <!-- Campo para e-mail -->
            <div class="col-sm-6 mb-3">
                <label for="email" class="form-label">E-mail:</label> <!-- form label define espaçamento, tamanho da fonte e alinhamento-->
                <input type="email" class="form-control custom-input" id="email"> <!-- form control faz o input ocupar 100%, padding e tipografia -->
            </div>

            <!--Usuário-->
            <div class="col-sm-6 mb-3">
                <div class="input-group">
                    <span class="input-group-text custom-icon">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control custom-input" placeholder="Nome de usuário...">
                </div>
            </div>

            <!-- Senha-->
             <div class="col-sm-6 mb-3">
                <label for="senha" class="form-label">Senha:</label>
                <input type="password" class="form-control custom-input" id="senha">
             </div>

             <!-- Botão de envio -->
              <button type="submit" class="btn btn-primary custom-buttom">Enviar</button>
              
        </form>
    </div> 

     

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
